name: Update caos-sdk package

# Bumps @office-of-the-citizen/caos-sdk whenever the SDK publishes a new version
# (repository_dispatch from caos-sdk) or on manual / scheduled check.
on:
  repository_dispatch:
    types: [sdk-released]
  schedule:
    # Backup: pick up missed publishes daily
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to install (empty = latest)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  packages: read

concurrency:
  group: update-caos-sdk
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@office-of-the-citizen"

      - name: Resolve target version
        id: ver
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="@office-of-the-citizen/caos-sdk"
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            TARGET="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TARGET="${{ github.event.inputs.version }}"
          else
            TARGET=$(npm view "$PKG" version --registry=https://npm.pkg.github.com)
          fi
          RAW=$(node -p "require('./package.json').dependencies['$PKG']")
          # file: / link: / tarball always treated as needing a registry pin
          if echo "$RAW" | grep -Eq '^(file:|link:|http)'; then
            CURRENT="(local)"
            CHANGED=true
          else
            CURRENT=$(echo "$RAW" | sed 's/^[\^~]//')
            if [ "$CURRENT" = "$TARGET" ]; then CHANGED=false; else CHANGED=true; fi
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Current=$CURRENT Target=$TARGET changed=$CHANGED"

      - name: Skip if already on target
        if: steps.ver.outputs.changed != 'true'
        run: echo "Already on ${{ steps.ver.outputs.target }} â€” nothing to do"

      - name: Bump dependency and install
        if: steps.ver.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${{ steps.ver.outputs.package }}"
          TARGET="${{ steps.ver.outputs.target }}"
          npm install "${PKG}@${TARGET}" --save-exact
          npm run typecheck
          npm test

      - name: Create Pull Request
        if: steps.ver.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): bump caos-sdk to ${{ steps.ver.outputs.target }}"
          title: "chore(deps): bump caos-sdk to ${{ steps.ver.outputs.target }}"
          body: |
            Automated package update.

            - Package: `@office-of-the-citizen/caos-sdk`
            - From: `${{ steps.ver.outputs.current }}`
            - To: `${{ steps.ver.outputs.target }}`

            Triggered by SDK publish / scheduled check.
          branch: deps/caos-sdk-${{ steps.ver.outputs.target }}
          delete-branch: true
          labels: dependencies, caos-sdk
