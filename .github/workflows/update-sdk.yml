name: Update caos-sdk package

# Whenever caos-sdk publishes a new version, pin this repo to that git tag.
on:
  repository_dispatch:
    types: [sdk-released]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to install (empty = latest git tag)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-caos-sdk
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve target version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="@office-of-the-citizen/caos-sdk"
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            TARGET="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TARGET="${{ github.event.inputs.version }}"
          else
            TARGET=$(gh api repos/office-of-the-citizen/caos-sdk/releases/latest --jq .tag_name | sed 's/^v//')
          fi
          TARGET="${TARGET#v}"
          SPEC="github:office-of-the-citizen/caos-sdk#v${TARGET}"
          RAW=$(node -p "require('./package.json').dependencies['$PKG'] || ''")
          if [ "$RAW" = "$SPEC" ]; then CHANGED=false; else CHANGED=true; fi
          {
            echo "target=$TARGET"
            echo "spec=$SPEC"
            echo "current=$RAW"
            echo "package=$PKG"
            echo "changed=$CHANGED"
          } >> "$GITHUB_OUTPUT"
          echo "Current=$RAW → $SPEC (changed=$CHANGED)"

      - name: Bump, verify, and push
        if: steps.ver.outputs.changed == 'true'
        run: |
          set -euo pipefail
          PKG="${{ steps.ver.outputs.package }}"
          SPEC="${{ steps.ver.outputs.spec }}"
          TARGET="${{ steps.ver.outputs.target }}"

          npm install "${SPEC}" --save-exact
          PKG="$PKG" SPEC="$SPEC" node -e '
            const fs=require("fs");
            const pkg=JSON.parse(fs.readFileSync("package.json","utf8"));
            const name=process.env.PKG, spec=process.env.SPEC;
            for (const [k,v] of Object.entries(pkg.dependencies||{})) {
              if (String(v)===spec || k.includes("caos-sdk")) delete pkg.dependencies[k];
            }
            pkg.dependencies[name]=spec;
            fs.writeFileSync("package.json", JSON.stringify(pkg,null,2)+"\n");
          '
          npm install
          npm run typecheck
          npm test

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(deps): bump caos-sdk to ${TARGET}"
          git push origin HEAD:main

      - name: Already current
        if: steps.ver.outputs.changed != 'true'
        run: echo "Already on ${{ steps.ver.outputs.spec }}"
