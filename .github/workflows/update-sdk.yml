name: Update caos-sdk package

# Bumps @office-of-the-citizen/caos-sdk whenever the SDK publishes a new version
# (repository_dispatch from caos-sdk) or on manual / scheduled check.
#
# Installs from the git tag (vX.Y.Z) so consumer repos do not need GitHub
# Packages read access. SDK is still published to npm.pkg.github.com for
# external consumers.
on:
  repository_dispatch:
    types: [sdk-released]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to install (empty = latest git tag)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-caos-sdk
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve target version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="@office-of-the-citizen/caos-sdk"
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            TARGET="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TARGET="${{ github.event.inputs.version }}"
          else
            TARGET=$(gh api repos/office-of-the-citizen/caos-sdk/releases/latest --jq .tag_name | sed 's/^v//')
          fi
          TARGET="${TARGET#v}"
          SPEC="github:office-of-the-citizen/caos-sdk#v${TARGET}"
          RAW=$(node -p "require('./package.json').dependencies['$PKG']")
          if [ "$RAW" = "$SPEC" ] || [ "$RAW" = "$TARGET" ] || [ "$RAW" = "v$TARGET" ]; then
            CHANGED=false
          else
            CHANGED=true
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "spec=$SPEC" >> "$GITHUB_OUTPUT"
          echo "current=$RAW" >> "$GITHUB_OUTPUT"
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Current=$RAW Target=$SPEC changed=$CHANGED"

      - name: Skip if already on target
        if: steps.ver.outputs.changed != 'true'
        run: echo "Already on ${{ steps.ver.outputs.spec }} — nothing to do"

      - name: Bump dependency and verify
        if: steps.ver.outputs.changed == 'true'
        run: |
          PKG="${{ steps.ver.outputs.package }}"
          SPEC="${{ steps.ver.outputs.spec }}"
          npm install "${SPEC}" --save-exact
          PKG="$PKG" SPEC="$SPEC" node -e '
            const fs=require("fs");
            const pkg=JSON.parse(fs.readFileSync("package.json","utf8"));
            const name=process.env.PKG, spec=process.env.SPEC;
            for (const [k,v] of Object.entries(pkg.dependencies||{})) {
              if (String(v)===spec || k.includes("caos-sdk")) delete pkg.dependencies[k];
            }
            pkg.dependencies[name]=spec;
            fs.writeFileSync("package.json", JSON.stringify(pkg,null,2)+"\n");
          '
          npm install
          npm run typecheck
          npm test

      - name: Create Pull Request
        if: steps.ver.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): bump caos-sdk to ${{ steps.ver.outputs.target }}"
          title: "chore(deps): bump caos-sdk to ${{ steps.ver.outputs.target }}"
          body: |
            Automated package update.

            - Package: `@office-of-the-citizen/caos-sdk`
            - Spec: `${{ steps.ver.outputs.spec }}`
            - Previous: `${{ steps.ver.outputs.current }}`

            Triggered by SDK publish / scheduled check.
          branch: deps/caos-sdk-${{ steps.ver.outputs.target }}
          delete-branch: true
          labels: dependencies, caos-sdk
